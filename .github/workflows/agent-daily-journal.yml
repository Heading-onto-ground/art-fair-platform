name: Agent Daily Journal

on:
  schedule:
    # 18:00 KST (UTC+9) = 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  write-daily-journal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - name: Generate daily journal
        shell: bash
        run: |
          set -euo pipefail
          DATE_KST="$(TZ=Asia/Seoul date +%F)"
          TIME_KST="$(TZ=Asia/Seoul date +%H:%M)"
          FILE="docs/worklogs/${DATE_KST}.md"
          mkdir -p docs/worklogs

          COMMITS="$(git log --since='24 hours ago' --pretty='- %h %s (%an)' -n 50 || true)"
          if [ -z "${COMMITS}" ]; then
            COMMITS="- 최근 24시간 커밋 없음"
          fi

          if [ ! -f "${FILE}" ]; then
            cat > "${FILE}" <<EOF
# Agent Daily Journal - ${DATE_KST} (KST)

- Report Time (KST): 18:00
- Last Auto Update (KST): ${TIME_KST}
- Reporter: Agent Reporter

## 1) 오늘 목표 (Top 3)

- G-01: 플랫폼 안정화
- G-02: 갤러리 리드 수집 및 DM 워크플로
- G-03: SNS 기반 아티스트 모집 마케팅

## 2) 자동 스냅샷

### 최근 24시간 커밋
${COMMITS}

## 3) 수동 업무일지 (에이전트가 채움)

- [시간] [Goal/Issue] 진행 내용
- [시간] [Goal/Issue] 진행 내용

## 4) 결과 요약

- Done:
- Partial:
- Blocked:

## 5) KPI Snapshot

- G-01
  - CI first-pass success:
  - Repeated failure count:
- G-02
  - New qualified leads:
  - DM response rate (7d rolling):
- G-03
  - Weekly artist leads:
  - Landing conversion:

## 6) 리스크 / 승인 필요

- 리스크:
- 필요한 승인:

## 7) 내일 우선순위

1.
2.
3.
EOF
          else
            cat >> "${FILE}" <<EOF

---

## Auto Update - ${TIME_KST} KST

### 최근 24시간 커밋
${COMMITS}
EOF
          fi

      - name: Commit and push journal
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/worklogs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE_KST="$(TZ=Asia/Seoul date +%F)"
          git commit -m "chore: add daily agent journal for ${DATE_KST}"
          git push
