name: Agent Daily Journal

on:
  schedule:
    # 18:00 KST (UTC+9) = 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  write-daily-journal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - name: Generate daily journal
        shell: bash
        run: bash scripts/generate-daily-journal.sh

      - name: Commit and push journal
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/worklogs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE_KST="$(TZ=Asia/Seoul date +%F)"
          git commit -m "chore: add daily agent journal for ${DATE_KST}"
          git push
